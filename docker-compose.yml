# Local development database. Start with: docker compose up -d
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: studyos
      POSTGRES_PASSWORD: studyos
      POSTGRES_DB: studyos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyos -d studyos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

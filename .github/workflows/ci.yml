name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: studyos
          POSTGRES_PASSWORD: studyos
          POSTGRES_DB: studyos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studyos -d studyos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://studyos:studyos@localhost:5432/studyos

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version is read from the "packageManager" field in package.json.

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (includes DB integration tests against the migrated DB)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Database smoke test (built client against migrated DB)
        run: pnpm smoke:db

      - name: Runtime smoke test (built API artifact)
        run: pnpm smoke
